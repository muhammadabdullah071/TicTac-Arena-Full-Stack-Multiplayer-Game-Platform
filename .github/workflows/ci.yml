name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npm run -w apps/web typecheck
      - run: npx prettier --check "apps/web/src/**/*.{js,jsx,ts,tsx}"

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tictac
          POSTGRES_PASSWORD: tictac_password
          POSTGRES_DB: tictac_arena_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate --schema=packages/database/prisma/schema.prisma
      - run: npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://tictac:tictac_password@localhost:5432/tictac_arena_test
      - run: npm run -w apps/web test
        env:
          DATABASE_URL: postgresql://tictac:tictac_password@localhost:5432/tictac_arena_test
          REDIS_URL: redis://localhost:6379
          AUTH_SECRET: test-secret
      - run: npm run -w apps/socket test 2>/dev/null || true
        env:
          DATABASE_URL: postgresql://tictac:tictac_password@localhost:5432/tictac_arena_test
          REDIS_URL: redis://localhost:6379
          AUTH_SECRET: test-secret

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate --schema=packages/database/prisma/schema.prisma
      - run: npm run -w packages/shared build
      - run: npm run -w packages/database build
      - run: npm run -w apps/web build
      - run: npm run -w apps/socket build
